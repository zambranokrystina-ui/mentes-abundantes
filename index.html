<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Descubre tus Valores — Mentes Abundantes</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1B2A4A;
    --navy-light: #253A5E;
    --blue: #1B4F8A;
    --blue-light: #2A6CB8;
    --blue-dark: #0F3460;
    --orange: #D4782A;
    --orange-light: #E08A3C;
    --orange-glow: rgba(212, 120, 42, 0.15);
    --green: #7A9A4A;
    --green-light: #8BAA58;
    --cream: #E8D4AD;
    --cream-light: #F2E6D0;
    --white: #FFFFFF;
    --off-white: #F5F2ED;
    --gray-50: #F0EDE8;
    --gray-100: #E2DED6;
    --gray-300: #B0A899;
    --gray-500: #6B6458;
    --gray-700: #3A352C;
    --gray-900: #1A1814;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Poppins', sans-serif;
    background: var(--off-white);
    min-height: 100vh;
    color: var(--gray-900);
    overflow-x: hidden;
  }

  .bg-decoration {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0; overflow: hidden;
  }
  .bg-decoration .circle { position: absolute; border-radius: 50%; opacity: 0.07; }
  .bg-decoration .circle-1 { width: 500px; height: 500px; background: var(--navy); top: -150px; right: -100px; }
  .bg-decoration .circle-2 { width: 400px; height: 400px; background: var(--orange); bottom: -100px; left: -100px; }
  .bg-decoration .circle-3 { width: 250px; height: 250px; background: var(--green); top: 50%; left: 60%; }

  .app-container {
    position: relative; z-index: 1;
    max-width: 680px; margin: 0 auto;
    padding: 20px 16px 40px;
    min-height: 100vh;
    display: flex; flex-direction: column;
  }

  .header { text-align: center; padding: 30px 0 10px; }
  .header .logo-circle {
    width: 80px; height: 80px; margin: 0 auto 16px;
    border-radius: 50%; background: var(--navy);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 30px rgba(27, 42, 74, 0.3);
    border: 3px solid var(--cream);
  }
  .header .logo-circle span { font-size: 32px; }
  .header h1 {
    font-size: 26px; font-weight: 700;
    background: linear-gradient(135deg, var(--navy), var(--navy-light));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    line-height: 1.2;
  }
  .header .subtitle {
    font-size: 14px; color: var(--orange); font-weight: 600;
    margin-top: 4px; letter-spacing: 1.5px; text-transform: uppercase;
  }

  .progress-container { margin: 24px 0 8px; }
  .progress-labels {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--gray-500); margin-bottom: 6px; font-weight: 500;
  }
  .progress-bar { height: 6px; background: var(--gray-100); border-radius: 10px; overflow: hidden; }
  .progress-fill {
    height: 100%; border-radius: 10px;
    background: linear-gradient(90deg, var(--navy), var(--green), var(--orange));
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .section-dots { display: flex; justify-content: center; gap: 8px; margin: 16px 0; }
  .section-dot {
    width: 10px; height: 10px; border-radius: 50%;
    border: 2px solid var(--gray-300); background: transparent;
    cursor: pointer; transition: all 0.3s; padding: 0;
  }
  .section-dot.active {
    background: var(--orange); border-color: var(--orange);
    transform: scale(1.2); box-shadow: 0 0 0 4px var(--orange-glow);
  }
  .section-dot.completed { background: var(--navy); border-color: var(--navy); }

  .card {
    background: var(--white); border-radius: 24px;
    padding: 36px 32px;
    box-shadow: 0 4px 24px rgba(26, 35, 50, 0.06), 0 1px 4px rgba(26, 35, 50, 0.04);
    border: 1px solid rgba(226, 230, 239, 0.6);
    flex: 1; display: flex; flex-direction: column; justify-content: center;
    animation: fadeSI 0.45s ease-out; min-height: 420px;
  }
  @keyframes fadeSI { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .intro { text-align: center; }
  .intro .icon-big { font-size: 48px; margin-bottom: 20px; }
  .intro h2 {
    font-size: 28px; font-weight: 700;
    background: linear-gradient(135deg, var(--navy), var(--navy-light));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    margin-bottom: 6px;
  }
  .intro .tagline { color: var(--orange); font-weight: 600; font-size: 15px; margin-bottom: 24px; }
  .intro .description {
    background: linear-gradient(135deg, rgba(27,42,74,0.04), rgba(122,154,74,0.04));
    border-radius: 16px; padding: 24px; font-size: 14px;
    color: var(--gray-700); line-height: 1.7; margin-bottom: 28px;
    border-left: 4px solid var(--green); text-align: left;
  }
  .intro .meta { font-size: 12px; color: var(--gray-500); margin-top: 12px; }

  .name-section { text-align: center; }
  .name-section h2 { font-size: 22px; font-weight: 600; color: var(--navy); margin-bottom: 6px; }
  .name-section .sub { color: var(--gray-500); font-size: 13px; margin-bottom: 28px; }
  .name-fields { display: flex; flex-direction: column; gap: 16px; max-width: 400px; margin: 0 auto; }
  .field-group { text-align: left; }
  .field-group label {
    font-size: 12px; font-weight: 600; color: var(--gray-700);
    text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; display: block;
  }
  .field-group input {
    width: 100%; padding: 14px 18px; border-radius: 12px;
    border: 2px solid var(--gray-100);
    font-family: 'Poppins', sans-serif; font-size: 15px;
    color: var(--gray-900); background: var(--gray-50);
    transition: all 0.3s; outline: none;
  }
  .field-group input::placeholder { color: var(--gray-300); }
  .field-group input:focus {
    border-color: var(--navy-light); background: var(--white);
    box-shadow: 0 0 0 4px rgba(27, 42, 74, 0.1);
  }

  .section-header { text-align: center; padding: 20px 0; }
  .section-header .icon-wrap {
    width: 64px; height: 64px; border-radius: 20px;
    display: inline-flex; align-items: center; justify-content: center;
    margin-bottom: 16px; font-size: 30px;
  }
  .section-header .icon-wrap.blue {
    background: linear-gradient(135deg, rgba(27,42,74,0.08), rgba(37,58,94,0.08));
    border: 1px solid rgba(27,42,74,0.12);
  }
  .section-header .icon-wrap.orange {
    background: linear-gradient(135deg, rgba(212,120,42,0.08), rgba(224,138,60,0.08));
    border: 1px solid rgba(212,120,42,0.12);
  }
  .section-header .icon-wrap.mixed {
    background: linear-gradient(135deg, rgba(122,154,74,0.08), rgba(212,120,42,0.08));
    border: 1px solid rgba(122,154,74,0.12);
  }
  .section-header h3 { font-size: 20px; font-weight: 700; color: var(--navy); margin-bottom: 4px; }
  .section-header p { font-size: 13px; color: var(--gray-500); }

  .question-area { flex: 1; display: flex; flex-direction: column; }
  .q-number {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--orange); margin-bottom: 12px;
  }
  .q-text { font-size: 18px; font-weight: 600; color: var(--navy); line-height: 1.5; margin-bottom: 24px; }
  .q-text .optional {
    display: inline-block; font-size: 11px; font-weight: 500;
    color: var(--gray-500); background: var(--gray-50);
    padding: 2px 10px; border-radius: 20px; margin-left: 6px; vertical-align: middle;
  }
  .answer-box {
    width: 100%; min-height: 160px; padding: 18px 20px;
    border: 2px solid var(--gray-100); border-radius: 16px;
    font-family: 'Poppins', sans-serif; font-size: 15px;
    color: var(--gray-900); background: var(--gray-50);
    resize: vertical; outline: none; transition: all 0.3s; line-height: 1.6;
  }
  .answer-box::placeholder { color: var(--gray-300); }
  .answer-box:focus {
    border-color: var(--navy-light); background: var(--white);
    box-shadow: 0 0 0 4px rgba(27, 42, 74, 0.08);
  }
  .char-count { font-size: 11px; color: var(--gray-300); text-align: right; margin-top: 6px; }

  .nav-buttons { display: flex; gap: 12px; margin-top: 28px; }
  .btn-back, .btn-next {
    flex: 1; padding: 16px 24px; border-radius: 14px;
    font-family: 'Poppins', sans-serif; font-size: 15px;
    font-weight: 600; cursor: pointer; transition: all 0.3s; border: none;
  }
  .btn-back {
    background: var(--gray-50); color: var(--gray-700);
    border: 2px solid var(--gray-100);
  }
  .btn-back:hover { background: var(--gray-100); }
  .btn-next {
    background: linear-gradient(135deg, var(--navy), var(--navy-light));
    color: var(--white); box-shadow: 0 4px 15px rgba(27, 42, 74, 0.3);
  }
  .btn-next:hover:not(:disabled) {
    transform: translateY(-1px); box-shadow: 0 6px 20px rgba(27, 42, 74, 0.4);
  }
  .btn-next:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-start {
    width: 100%; padding: 18px; border-radius: 14px; border: none;
    background: linear-gradient(135deg, var(--orange), var(--orange-light));
    color: var(--white); font-family: 'Poppins', sans-serif;
    font-size: 17px; font-weight: 700; cursor: pointer;
    box-shadow: 0 4px 20px rgba(212, 120, 42, 0.4); transition: all 0.3s;
  }
  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(212, 120, 42, 0.5); }

  .end-screen { text-align: center; }
  .end-screen .icon-big { font-size: 64px; margin-bottom: 20px; }
  .end-screen h2 { font-size: 26px; font-weight: 700; color: var(--navy); margin-bottom: 8px; }
  .end-screen .msg { font-size: 15px; color: var(--gray-500); line-height: 1.7; margin-bottom: 28px; }
  .end-screen .btn-restart {
    display: inline-block; padding: 14px 32px; border-radius: 14px; border: none;
    background: var(--green); color: var(--white);
    font-family: 'Poppins', sans-serif; font-size: 15px;
    font-weight: 600; cursor: pointer; transition: all 0.3s;
  }
  .status-msg {
    margin-top: 16px; padding: 12px 20px; border-radius: 12px;
    font-size: 13px; text-align: center;
  }
  .status-msg.ok { background: rgba(122,154,74,0.1); color: var(--green); }
  .status-msg.err { background: rgba(212,120,42,0.1); color: var(--orange); }
  .status-msg.sending { background: rgba(27,42,74,0.06); color: var(--navy); }

  @media(max-width:600px) {
    .card { padding: 28px 20px; min-height: 380px; }
    .header h1 { font-size: 22px; }
    .q-text { font-size: 16px; }
  }
</style>
</head>
<body>

<div class="bg-decoration">
  <div class="circle circle-1"></div>
  <div class="circle circle-2"></div>
  <div class="circle circle-3"></div>
</div>

<div class="app-container">
  <div class="header">
    <div class="logo-circle"><span>✨</span></div>
    <h1>Mentes Abundantes</h1>
    <div class="subtitle">Descubre tus Valores</div>
  </div>

  <div class="progress-container" id="progressArea" style="display:none">
    <div class="progress-labels">
      <span id="progressLabel">Pregunta 1 de 8</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div class="section-dots" id="dotsArea" style="display:none"></div>

  <div class="card" id="cardArea"></div>
</div>

<script>
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwzkHRqK2YCt8--c4LvObfIanASvt0xm6NinduMkm-gxiF5nA32CsEUI4E0MWuQYgBT/exec";

var state = {
  screen: "intro",
  nombre: "",
  apellido: "",
  answers: {},
  currentQ: 0,
  sending: false
};

var sections = [
  { title: "Tus Valores Personales", icon: "💎", cls: "blue",
    desc: "Conecta con lo que te define como persona" },
  { title: "Valores de tu Emprendimiento", icon: "🚀", cls: "orange",
    desc: "Descubre la esencia de tu negocio" },
  { title: "La Conexión entre Ambos", icon: "🌿", cls: "mixed",
    desc: "Encuentra la alineación perfecta" }
];

var questions = [
  { id: "q1", section: 0, text: "¿Qué tenían en común los momentos de tu vida en los que te has sentido más plena y orgullosa?", placeholder: "Piensa en esos momentos especiales..." },
  { id: "q2", section: 0, text: "Elige 3 palabras que definan lo innegociable en tu vida. ¿Cuáles son?", placeholder: "Escribe tus 3 palabras..." },
  { id: "q3", section: 0, text: "¿Qué situación o comportamiento te incomoda profundamente y por qué?", placeholder: "Reflexiona sobre lo que no toleras..." },
  { id: "q4", section: 1, text: "Más allá de generar ingresos, ¿qué quieres que tu emprendimiento represente en el mundo?", placeholder: "El propósito profundo de tu negocio..." },
  { id: "q5", section: 1, text: "Si una clienta describiera tu marca a una amiga, ¿qué te gustaría que dijera?", placeholder: "Imagina esa conversación..." },
  { id: "q6", section: 1, text: "¿En qué momento sientes que tu emprendimiento está completamente alineado contigo?", placeholder: "Describe ese momento..." },
  { id: "q7", section: 2, text: "¿Dónde notas la mayor brecha entre tus valores personales y los de tu emprendimiento?", placeholder: "Identifica esa diferencia..." },
  { id: "q8", section: 2, text: "¿Hay algo más que quieras compartir sobre tus valores?", placeholder: "Espacio libre para ti...", optional: true }
];

function escHtml(s) { var d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

function canGoNext() {
  if (state.screen === "name") return state.nombre.trim() && state.apellido.trim();
  if (state.screen === "question") {
    var q = questions[state.currentQ];
    if (q.optional) return true;
    return (state.answers[q.id] || "").trim().length > 0;
  }
  return true;
}

function updateNextBtn() {
  var btn = document.querySelector(".btn-next");
  if (btn) btn.disabled = !canGoNext();
}

function updateProgress() {
  var area = document.getElementById("progressArea");
  var dots = document.getElementById("dotsArea");
  if (state.screen !== "question") { area.style.display = "none"; dots.style.display = "none"; return; }
  area.style.display = "block"; dots.style.display = "flex";
  var n = state.currentQ + 1, total = questions.length;
  var pct = Math.round((n / total) * 100);
  document.getElementById("progressLabel").textContent = "Pregunta " + n + " de " + total;
  document.getElementById("progressPct").textContent = pct + "%";
  document.getElementById("progressFill").style.width = pct + "%";

  var curSec = questions[state.currentQ].section;
  var dotsHtml = "";
  for (var i = 0; i < sections.length; i++) {
    var cls = i < curSec ? "completed" : i === curSec ? "active" : "";
    dotsHtml += '<button class="section-dot ' + cls + '" title="' + escHtml(sections[i].title) + '"></button>';
  }
  dots.innerHTML = dotsHtml;
}

function render() {
  var card = document.getElementById("cardArea");
  updateProgress();

  if (state.screen === "intro") {
    card.innerHTML = '<div class="intro">' +
      '<div class="icon-big">✨</div>' +
      '<h2>Descubre tus Valores</h2>' +
      '<div class="tagline">Mentes Abundantes</div>' +
      '<div class="description">' +
        'Esta encuesta te ayudará a identificar tus <strong>valores personales</strong> y los ' +
        '<strong>valores de tu emprendimiento</strong>. No hay respuestas correctas o incorrectas — ' +
        'solo tu verdad. Tómate unos minutos para reflexionar con calma.' +
      '</div>' +
      '<button class="btn-start" onclick="state.screen=\'name\'; render()">Comenzar ✨</button>' +
      '<div class="meta">⏱ Aproximadamente 10-15 minutos</div>' +
    '</div>';
    return;
  }

  if (state.screen === "name") {
    card.innerHTML = '<div class="name-section">' +
      '<h2>¡Hola! 👋</h2>' +
      '<div class="sub">Antes de comenzar, cuéntanos quién eres</div>' +
      '<div class="name-fields">' +
        '<div class="field-group">' +
          '<label>Nombre</label>' +
          '<input type="text" data-autofocus placeholder="Tu nombre" value="' + escHtml(state.nombre) + '" oninput="state.nombre=this.value; updateNextBtn()" />' +
        '</div>' +
        '<div class="field-group">' +
          '<label>Apellido</label>' +
          '<input type="text" placeholder="Tu apellido" value="' + escHtml(state.apellido) + '" oninput="state.apellido=this.value; updateNextBtn()" />' +
        '</div>' +
      '</div>' +
      '<div class="nav-buttons">' +
        '<button class="btn-back" onclick="state.screen=\'intro\'; render()">← Atrás</button>' +
        '<button class="btn-next" disabled onclick="state.screen=\'question\'; state.currentQ=0; render()">Siguiente →</button>' +
      '</div>' +
    '</div>';
    updateNextBtn();
    var af = card.querySelector("[data-autofocus]"); if (af && !state.nombre) af.focus();
    return;
  }

  if (state.screen === "question") {
    var q = questions[state.currentQ];
    var sec = sections[q.section];
    var prev = state.currentQ > 0 ? questions[state.currentQ - 1] : null;
    var showHeader = !prev || prev.section !== q.section;
    var isLast = state.currentQ === questions.length - 1;
    var val = state.answers[q.id] || "";

    var html = "";
    if (showHeader) {
      html += '<div class="section-header">' +
        '<div class="icon-wrap ' + sec.cls + '">' + sec.icon + '</div>' +
        '<h3>' + escHtml(sec.title) + '</h3>' +
        '<p>' + escHtml(sec.desc) + '</p>' +
      '</div>';
    }
    html += '<div class="question-area">' +
      '<div class="q-number">Pregunta ' + (state.currentQ + 1) + ' de ' + questions.length + '</div>' +
      '<div class="q-text">' + escHtml(q.text) + (q.optional ? ' <span class="optional">Opcional</span>' : '') + '</div>' +
      '<textarea class="answer-box" data-autofocus placeholder="' + escHtml(q.placeholder) + '" oninput="updateAnswer(\'' + q.id + '\', this.value)">' + escHtml(val) + '</textarea>' +
      '<div class="char-count">' + val.length + ' caracteres</div>' +
    '</div>';
    html += '<div class="nav-buttons">' +
      '<button class="btn-back" onclick="goBack()">← Atrás</button>' +
      '<button class="btn-next" onclick="goForward()">' + (isLast ? 'Enviar ✨' : 'Siguiente →') + '</button>' +
    '</div>';
    card.innerHTML = html;
    updateNextBtn();
    var af2 = card.querySelector("[data-autofocus]"); if (af2) af2.focus();
    return;
  }

  if (state.screen === "sending") {
    card.innerHTML = '<div class="end-screen">' +
      '<div class="icon-big">📤</div>' +
      '<h2>Enviando...</h2>' +
      '<div class="msg">Guardando tus respuestas, un momento por favor.</div>' +
      '<div class="status-msg sending">Enviando respuestas...</div>' +
    '</div>';
    return;
  }

  if (state.screen === "done") {
    card.innerHTML = '<div class="end-screen">' +
      '<div class="icon-big">🎉</div>' +
      '<h2>¡Gracias, ' + escHtml(state.nombre) + '!</h2>' +
      '<div class="msg">Tus respuestas han sido guardadas exitosamente.<br>Este es un paso muy importante en tu camino emprendedor.</div>' +
      '<div class="status-msg ok">✓ Respuestas guardadas correctamente</div>' +
    '</div>';
    return;
  }

  if (state.screen === "error") {
    card.innerHTML = '<div class="end-screen">' +
      '<div class="icon-big">⚠️</div>' +
      '<h2>Hubo un problema</h2>' +
      '<div class="msg">No pudimos guardar tus respuestas. Por favor intenta de nuevo.</div>' +
      '<div class="status-msg err">Error al enviar. Revisa tu conexión.</div>' +
      '<br><button class="btn-start" onclick="submitAnswers()">Reintentar</button>' +
    '</div>';
    return;
  }
}

function updateAnswer(id, val) {
  state.answers[id] = val;
  var cc = document.querySelector(".char-count");
  if (cc) cc.textContent = val.length + " caracteres";
  updateNextBtn();
}

function goBack() {
  if (state.currentQ > 0) { state.currentQ--; }
  else { state.screen = "name"; }
  render();
}

function goForward() {
  if (state.currentQ < questions.length - 1) { state.currentQ++; render(); }
  else { submitAnswers(); }
}

async function submitAnswers() {
  state.screen = "sending"; render();

  var payload = {
    timestamp: new Date().toLocaleString("es-ES"),
    nombre: state.nombre,
    apellido: state.apellido
  };
  for (var i = 0; i < questions.length; i++) {
    payload[questions[i].id] = state.answers[questions[i].id] || "";
  }

  if (!GOOGLE_SCRIPT_URL) {
    console.log("No Google Script URL configured. Data:", payload);
    state.screen = "done"; render(); return;
  }

  try {
    await fetch(GOOGLE_SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify(payload)
    });
    state.screen = "done"; render();
  } catch (e) {
    console.error(e);
    state.screen = "error"; render();
  }
}

render();
</script>
</body>
</html>
